<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>幹部讀書研討會 · 知識共享平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --navy:#0A2540; --navy-2:#123458; --navy-3:#1B4066;
  --gold:#C9A84C; --gold-light:#E3CE94; --gold-pale:#F5EEDC;
  --green:#1E5C35;
  --paper:#FAF7F0; --card:#FFFFFF; --ink:#22303E; --ink-2:#5B6B7A;
  --line:#E4DDCE; --danger:#A33226;
  --serif:'Noto Serif TC',serif; --sans:'Noto Sans TC',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.7;font-size:16px}
a{color:var(--navy-3)}
button{font-family:var(--sans);cursor:pointer}

/* ---------- Header ---------- */
header{background:var(--navy);color:#fff;padding:0}
.hd-inner{max-width:1080px;margin:0 auto;padding:20px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.hd-mark{width:44px;height:44px;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:700;color:var(--gold);font-size:20px;flex:none}
.hd-title h1{font-family:var(--serif);font-size:22px;font-weight:700;letter-spacing:.06em}
.hd-title p{font-size:12.5px;color:var(--gold-light);letter-spacing:.18em;margin-top:2px}
.hd-actions{margin-left:auto;display:flex;gap:10px;align-items:center}
.btn{border:1px solid var(--gold);background:transparent;color:var(--gold);padding:7px 16px;font-size:13.5px;letter-spacing:.05em;transition:all .15s}
.btn:hover{background:var(--gold);color:var(--navy)}
.btn.solid{background:var(--gold);color:var(--navy);font-weight:500}
.btn.solid:hover{background:var(--gold-light)}
.btn.ghost{border-color:rgba(255,255,255,.35);color:rgba(255,255,255,.85)}
.btn.ghost:hover{border-color:#fff;color:#fff;background:transparent}
.gold-rule{height:3px;background:linear-gradient(90deg,var(--gold),var(--gold-light) 60%,transparent)}

/* ---------- Layout ---------- */
main{max-width:1080px;margin:0 auto;padding:36px 24px 80px}
.crumb{font-size:13.5px;color:var(--ink-2);margin-bottom:22px}
.crumb a{color:var(--navy-3);text-decoration:none;cursor:pointer}
.crumb a:hover{text-decoration:underline}
.crumb span.sep{margin:0 8px;color:var(--gold)}
.sec-head{display:flex;align-items:baseline;gap:14px;margin-bottom:24px;flex-wrap:wrap}
.sec-head h2{font-family:var(--serif);font-size:24px;color:var(--navy);font-weight:700}
.sec-head .count{font-size:13px;color:var(--ink-2)}
.sec-head .grow{flex:1}

/* ---------- Book shelf ---------- */
.shelf{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:22px}
.book{background:var(--navy);color:#fff;min-height:200px;padding:26px 22px 20px;display:flex;flex-direction:column;position:relative;cursor:pointer;transition:transform .15s,box-shadow .15s;border-left:6px solid var(--gold)}
.book:hover{transform:translateY(-4px);box-shadow:0 10px 24px rgba(10,37,64,.25)}
.book .b-eyebrow{font-size:11.5px;letter-spacing:.22em;color:var(--gold-light);margin-bottom:10px}
.book h3{font-family:var(--serif);font-size:19px;font-weight:700;line-height:1.5;flex:1}
.book .b-author{font-size:13px;color:rgba(255,255,255,.75);margin-top:12px}
.book .b-meta{font-size:12px;color:var(--gold-light);margin-top:6px;border-top:1px solid rgba(201,168,76,.35);padding-top:10px;display:flex;justify-content:space-between}
.empty{padding:60px 20px;text-align:center;color:var(--ink-2);border:1.5px dashed var(--line);font-size:15px}

/* ---------- Book detail / chapter list ---------- */
.book-hero{background:var(--navy);color:#fff;padding:30px 28px;border-left:6px solid var(--gold);margin-bottom:28px}
.book-hero h2{font-family:var(--serif);font-size:26px;font-weight:700}
.book-hero .ba{color:var(--gold-light);font-size:14px;margin-top:6px}
.book-hero .bd{font-size:14.5px;color:rgba(255,255,255,.85);margin-top:12px;max-width:720px}
.ch-list{display:flex;flex-direction:column;gap:10px}
.ch-item{background:var(--card);border:1px solid var(--line);padding:16px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:border-color .15s,background .15s}
.ch-item:hover{border-color:var(--gold);background:var(--gold-pale)}
.ch-num{font-family:var(--serif);font-size:15px;color:var(--gold);font-weight:700;min-width:44px}
.ch-item .ch-t{font-size:15.5px;font-weight:500;flex:1}
.ch-item .ch-c{font-size:12.5px;color:var(--ink-2)}
.ch-item .del{color:var(--danger);border:none;background:none;font-size:12.5px}

/* ---------- Chapter view ---------- */
.ch-head{border-bottom:2px solid var(--navy);padding-bottom:16px;margin-bottom:22px}
.ch-head .eyebrow{font-size:12px;letter-spacing:.2em;color:var(--ink-2)}
.ch-head h2{font-family:var(--serif);font-size:24px;color:var(--navy);margin-top:4px}
.pdf-bar{display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.btn.navy{border-color:var(--navy);color:var(--navy)}
.btn.navy:hover{background:var(--navy);color:#fff}
.pdf-frame{width:100%;height:72vh;border:1px solid var(--line);background:#fff}
.notice{font-size:12.5px;color:var(--ink-2);background:var(--gold-pale);border-left:3px solid var(--gold);padding:8px 14px;margin:14px 0 30px}

/* ---------- Discussion ---------- */
.disc{margin-top:44px}
.disc-head{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.disc-head h3{font-family:var(--serif);font-size:20px;color:var(--navy)}
.disc-head .dot{width:8px;height:8px;background:var(--gold);transform:rotate(45deg)}
.post-form{background:var(--card);border:1px solid var(--line);padding:20px;margin-bottom:26px}
.post-form label{font-size:13px;color:var(--ink-2);display:block;margin-bottom:4px}
.post-form input[type=text],.post-form textarea{width:100%;border:1px solid var(--line);padding:9px 12px;font-family:var(--sans);font-size:14.5px;background:#fff}
.post-form input:focus,.post-form textarea:focus{outline:2px solid var(--gold);outline-offset:-1px}
.post-form textarea{min-height:110px;resize:vertical;margin-top:12px}
.post-form .row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.post-form .row>div{flex:1;min-width:200px}
.form-foot{display:flex;justify-content:flex-end;margin-top:12px;gap:10px}
.post{background:var(--card);border:1px solid var(--line);padding:18px 20px;margin-bottom:14px}
.post .p-head{display:flex;align-items:baseline;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.post .p-name{font-weight:700;color:var(--navy);font-size:15px}
.post .p-time{font-size:12px;color:var(--ink-2)}
.post .p-body{font-size:14.5px;white-space:pre-wrap}
.post .p-actions{margin-top:10px;display:flex;gap:14px}
.post .p-actions button{background:none;border:none;font-size:12.5px;color:var(--navy-3)}
.post .p-actions button:hover{text-decoration:underline}
.post .p-actions .del{color:var(--danger)}
.reply{margin-left:34px;border-left:3px solid var(--gold-light);background:#FCFAF4}
.reply-form{margin-left:34px;margin-bottom:14px}

/* ---------- Modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(10,37,64,.55);display:none;align-items:center;justify-content:center;padding:20px;z-index:50}
.overlay.open{display:flex}
.modal{background:#fff;max-width:520px;width:100%;padding:28px;border-top:4px solid var(--gold);max-height:90vh;overflow:auto}
.modal h3{font-family:var(--serif);font-size:19px;color:var(--navy);margin-bottom:18px}
.modal label{font-size:13px;color:var(--ink-2);display:block;margin:14px 0 4px}
.modal input[type=text],.modal input[type=number],.modal input[type=password],.modal textarea,.modal input[type=file]{width:100%;border:1px solid var(--line);padding:9px 12px;font-family:var(--sans);font-size:14.5px}
.modal textarea{min-height:80px;resize:vertical}
.modal .m-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:24px}
.btn.plain{border-color:var(--line);color:var(--ink-2)}
.progress{font-size:13px;color:var(--green);margin-top:10px;display:none}

/* ---------- Toast / footer ---------- */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 22px;font-size:14px;border-left:4px solid var(--gold);display:none;z-index:99}
footer{border-top:1px solid var(--line);padding:22px 24px;text-align:center;font-size:12px;color:var(--ink-2);letter-spacing:.08em}
.admin-tag{font-size:11px;background:var(--gold);color:var(--navy);padding:2px 8px;letter-spacing:.1em;font-weight:700;display:none}
body.admin .admin-tag{display:inline-block}
.admin-only{display:none}
body.admin .admin-only{display:inline-flex}
.setup-warn{max-width:720px;margin:60px auto;background:#fff;border:1px solid var(--line);border-top:4px solid var(--danger);padding:32px}
.setup-warn h2{font-family:var(--serif);color:var(--navy);margin-bottom:12px}
.setup-warn code{background:var(--gold-pale);padding:2px 6px;font-size:13.5px}
@media (max-width:640px){
  .hd-inner{padding:16px}
  main{padding:24px 16px 60px}
  .reply,.reply-form{margin-left:14px}
  .pdf-frame{height:60vh}
}
</style>
</head>
<body>

<header>
  <div class="hd-inner">
    <div class="hd-mark">研</div>
    <div class="hd-title">
      <h1>幹部讀書研討會</h1>
      <p>READING &amp; SHARING · 知識共享平台</p>
    </div>
    <div class="hd-actions">
      <span class="admin-tag">管理模式</span>
      <button class="btn ghost admin-only" onclick="exportAll()">匯出備份</button>
      <button class="btn ghost" id="adminBtn" onclick="toggleAdmin()">管理登入</button>
    </div>
  </div>
  <div class="gold-rule"></div>
</header>

<main id="app"></main>

<footer>本平台內容僅供公司內部教育訓練研討使用，請勿對外散布或作其他用途</footer>

<div class="toast" id="toast"></div>

<!-- 新增/編輯書籍 -->
<div class="overlay" id="bookModal">
  <div class="modal">
    <h3 id="bookModalTitle">新增書籍</h3>
    <label>書名 *</label>
    <input type="text" id="bkTitle" placeholder="例：目標：簡單有效的常識管理">
    <label>作者</label>
    <input type="text" id="bkAuthor" placeholder="例：高德拉特">
    <label>簡介 / 導讀重點</label>
    <textarea id="bkDesc" placeholder="這本書為什麼值得幹部研讀？希望大家聚焦什麼？"></textarea>
    <div class="m-foot">
      <button class="btn plain" onclick="closeModal('bookModal')">取消</button>
      <button class="btn solid" onclick="saveBook()">儲存</button>
    </div>
  </div>
</div>

<!-- 新增章節 -->
<div class="overlay" id="chModal">
  <div class="modal">
    <h3>新增章節</h3>
    <label>章節順序（數字，決定排列先後）*</label>
    <input type="number" id="chOrder" placeholder="例：1" min="0">
    <label>章節標題 *</label>
    <input type="text" id="chTitle" placeholder="例：第一章 突如其來的危機">
    <label>上傳章節 PDF 檔 *</label>
    <input type="file" id="chFile" accept="application/pdf">
    <div class="progress" id="chProgress">正在上傳 PDF，請稍候⋯</div>
    <div class="m-foot">
      <button class="btn plain" onclick="closeModal('chModal')">取消</button>
      <button class="btn solid" id="chSaveBtn" onclick="saveChapter()">上傳並儲存</button>
    </div>
  </div>
</div>

<!-- 管理登入 -->
<div class="overlay" id="pwModal">
  <div class="modal">
    <h3>管理登入</h3>
    <label>請輸入管理密碼</label>
    <input type="password" id="pwInput" onkeydown="if(event.key==='Enter')checkPw()">
    <div class="m-foot">
      <button class="btn plain" onclick="closeModal('pwModal')">取消</button>
      <button class="btn solid" onclick="checkPw()">登入</button>
    </div>
  </div>
</div>

<script>
/* ==========================================================
   系統設定 —— 部署時只需要改這一區（詳見部署指南）
   ========================================================== */
const CONFIG = {
  SUPABASE_URL:  "https://mbjyecdrcpovfrhdxpmd.supabase.co",        // 例：https://xxxx.supabase.co
  SUPABASE_KEY:  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ianllY2RyY3BvdmZyaGR4cG1kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNTI4NjIsImV4cCI6MjA5ODgyODg2Mn0.3xH6sGNYkv7VvzwZQjacUsJ_L8DpEkwrCLfbMArFhVk",   // Supabase 的 anon public key
  BUCKET:        "chapter-pdfs",             // 儲存 PDF 的 bucket 名稱
  ADMIN_PASS:    "gotrend2026"               // 管理密碼（請自行修改）
};
/* ========================================================== */

let db = null, state = { view:"books", bookId:null, book:null, chapterId:null, chapter:null };

function $(id){ return document.getElementById(id); }
function esc(s){ return (s||"").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg){ const t=$("toast"); t.textContent=msg; t.style.display="block"; setTimeout(()=>t.style.display="none", 2600); }
function fmtTime(ts){ const d=new Date(ts); return d.getFullYear()+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+String(d.getDate()).padStart(2,"0")+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }
function openModal(id){ $(id).classList.add("open"); }
function closeModal(id){ $(id).classList.remove("open"); }

/* ---------- 初始化 ---------- */
function init(){
  if(CONFIG.SUPABASE_URL.startsWith("YOUR_")){
    $("app").innerHTML = `<div class="setup-warn">
      <h2>尚未完成系統設定</h2>
      <p>請開啟 <code>index.html</code>，找到最上方的 <code>CONFIG</code> 區塊，
      填入您的 Supabase 網址與金鑰後重新上傳。詳細步驟請參考「部署指南」文件。</p></div>`;
    return;
  }
  db = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
  if(sessionStorage.getItem("rc_admin")==="1") setAdmin(true);
  showBooks();
}

function setAdmin(on){
  document.body.classList.toggle("admin", on);
  $("adminBtn").textContent = on ? "登出管理" : "管理登入";
  if(on) sessionStorage.setItem("rc_admin","1"); else sessionStorage.removeItem("rc_admin");
}
function toggleAdmin(){
  if(document.body.classList.contains("admin")){ setAdmin(false); render(); }
  else { $("pwInput").value=""; openModal("pwModal"); setTimeout(()=>$("pwInput").focus(),100); }
}
function checkPw(){
  if($("pwInput").value === CONFIG.ADMIN_PASS){ setAdmin(true); closeModal("pwModal"); toast("已進入管理模式"); render(); }
  else toast("密碼錯誤");
}
function isAdmin(){ return document.body.classList.contains("admin"); }

function render(){
  if(state.view==="books") showBooks();
  else if(state.view==="book") openBook(state.bookId);
  else if(state.view==="chapter") openChapter(state.chapterId);
}

/* ---------- 書籍目錄 ---------- */
async function showBooks(){
  state.view="books";
  $("app").innerHTML = `<div class="sec-head"><h2>書籍目錄</h2><span class="count" id="bkCount"></span><span class="grow"></span>
    <button class="btn navy admin-only" onclick="newBook()">＋ 新增書籍</button></div>
    <div class="shelf" id="shelf"><div class="empty">載入中⋯</div></div>`;
  const { data: books, error } = await db.from("books").select("*, chapters(count)").order("created_at",{ascending:true});
  if(error){ $("shelf").innerHTML = `<div class="empty">讀取失敗：${esc(error.message)}</div>`; return; }
  $("bkCount").textContent = `共 ${books.length} 本`;
  if(!books.length){ $("shelf").innerHTML = `<div class="empty">目前還沒有書籍。${isAdmin()?"點右上「＋ 新增書籍」開始建立第一本。":"請等待管理者建立書籍。"}</div>`; return; }
  $("shelf").innerHTML = books.map((b,i)=>`
    <div class="book" onclick="openBook('${b.id}')">
      <div class="b-eyebrow">BOOK ${String(i+1).padStart(2,"0")}</div>
      <h3>${esc(b.title)}</h3>
      <div class="b-author">${b.author?esc(b.author):"&nbsp;"}</div>
      <div class="b-meta"><span>${b.chapters?.[0]?.count ?? 0} 個章節</span><span>進入研讀 →</span></div>
    </div>`).join("");
}

function newBook(){ editingBookId=null; $("bookModalTitle").textContent="新增書籍"; $("bkTitle").value=""; $("bkAuthor").value=""; $("bkDesc").value=""; openModal("bookModal"); }
let editingBookId = null;
function editBook(){ const b=state.book; editingBookId=b.id; $("bookModalTitle").textContent="編輯書籍"; $("bkTitle").value=b.title; $("bkAuthor").value=b.author||""; $("bkDesc").value=b.description||""; openModal("bookModal"); }
async function saveBook(){
  const title=$("bkTitle").value.trim();
  if(!title){ toast("請填寫書名"); return; }
  const row={ title, author:$("bkAuthor").value.trim(), description:$("bkDesc").value.trim() };
  const q = editingBookId ? db.from("books").update(row).eq("id",editingBookId) : db.from("books").insert(row);
  const { error } = await q;
  if(error){ toast("儲存失敗："+error.message); return; }
  closeModal("bookModal"); toast("已儲存"); render();
}
async function deleteBook(){
  if(!confirm("確定刪除整本書？此書所有章節與心得都會一併刪除，無法復原。")) return;
  const { error } = await db.from("books").delete().eq("id",state.bookId);
  if(error){ toast("刪除失敗："+error.message); return; }
  toast("已刪除"); showBooks();
}

/* ---------- 書籍頁（章節清單） ---------- */
async function openBook(id){
  state.view="book"; state.bookId=id;
  const { data: book } = await db.from("books").select("*").eq("id",id).single();
  if(!book){ showBooks(); return; }
  state.book = book;
  const { data: chapters } = await db.from("chapters").select("*").eq("book_id",id).order("sort_order",{ascending:true});
  $("app").innerHTML = `
    <div class="crumb"><a onclick="showBooks()">書籍目錄</a><span class="sep">›</span>${esc(book.title)}</div>
    <div class="book-hero">
      <h2>${esc(book.title)}</h2>
      ${book.author?`<div class="ba">作者：${esc(book.author)}</div>`:""}
      ${book.description?`<div class="bd">${esc(book.description)}</div>`:""}
    </div>
    <div class="sec-head"><h2>章節內容</h2><span class="count">共 ${chapters.length} 章</span><span class="grow"></span>
      <button class="btn navy admin-only" onclick="newChapter()">＋ 新增章節</button>
      <button class="btn navy admin-only" onclick="editBook()">編輯書籍</button>
      <button class="btn plain admin-only" style="color:var(--danger);border-color:var(--danger)" onclick="deleteBook()">刪除書籍</button></div>
    <div class="ch-list">${ chapters.length ? chapters.map(c=>`
      <div class="ch-item" onclick="openChapter('${c.id}')">
        <span class="ch-num">${String(c.sort_order).padStart(2,"0")}</span>
        <span class="ch-t">${esc(c.title)}</span>
        <span class="ch-c">閱讀與研討 →</span>
        ${isAdmin()?`<button class="del" onclick="event.stopPropagation();deleteChapter('${c.id}','${esc(c.pdf_path)}')">刪除</button>`:""}
      </div>`).join("") : `<div class="empty">尚未上傳任何章節。</div>` }</div>`;
}

function newChapter(){ $("chOrder").value=""; $("chTitle").value=""; $("chFile").value=""; openModal("chModal"); }
async function saveChapter(){
  const order=parseInt($("chOrder").value), title=$("chTitle").value.trim(), file=$("chFile").files[0];
  if(isNaN(order)||!title||!file){ toast("順序、標題與 PDF 檔皆為必填"); return; }
  if(file.type!=="application/pdf"){ toast("請選擇 PDF 檔案"); return; }
  if(file.size > 50*1024*1024){ toast("檔案超過 50MB，請壓縮後再上傳"); return; }
  $("chSaveBtn").disabled=true; $("chProgress").style.display="block";
  const path = `${state.bookId}/${Date.now()}.pdf`;
  const { error: upErr } = await db.storage.from(CONFIG.BUCKET).upload(path, file, { contentType:"application/pdf" });
  if(upErr){ toast("PDF 上傳失敗："+upErr.message); $("chSaveBtn").disabled=false; $("chProgress").style.display="none"; return; }
  const { error } = await db.from("chapters").insert({ book_id:state.bookId, sort_order:order, title, pdf_path:path });
  $("chSaveBtn").disabled=false; $("chProgress").style.display="none";
  if(error){ toast("儲存失敗："+error.message); return; }
  closeModal("chModal"); toast("章節已建立"); openBook(state.bookId);
}
async function deleteChapter(id, pdfPath){
  if(!confirm("確定刪除此章節？相關心得會一併刪除。")) return;
  await db.storage.from(CONFIG.BUCKET).remove([pdfPath]);
  const { error } = await db.from("chapters").delete().eq("id",id);
  if(error){ toast("刪除失敗："+error.message); return; }
  toast("已刪除"); openBook(state.bookId);
}

/* ---------- 章節頁（PDF + 心得研討） ---------- */
function pdfUrl(path){ return db.storage.from(CONFIG.BUCKET).getPublicUrl(path).data.publicUrl; }

async function openChapter(id){
  state.view="chapter"; state.chapterId=id;
  const { data: ch } = await db.from("chapters").select("*, books(id,title)").eq("id",id).single();
  if(!ch){ showBooks(); return; }
  state.chapter=ch; state.bookId=ch.books.id; state.book={id:ch.books.id,title:ch.books.title};
  const url = pdfUrl(ch.pdf_path);
  $("app").innerHTML = `
    <div class="crumb"><a onclick="showBooks()">書籍目錄</a><span class="sep">›</span><a onclick="openBook('${ch.books.id}')">${esc(ch.books.title)}</a><span class="sep">›</span>${esc(ch.title)}</div>
    <div class="ch-head"><div class="eyebrow">CHAPTER ${String(ch.sort_order).padStart(2,"0")}</div><h2>${esc(ch.title)}</h2></div>
    <div class="pdf-bar">
      <button class="btn navy" onclick="window.open('${url}','_blank')">在新視窗開啟 PDF</button>
      <a href="${url}" download style="font-size:13.5px">下載 PDF</a>
    </div>
    <embed class="pdf-frame" src="${url}" type="application/pdf">
    <div class="notice">本章節內容僅供內部研讀，請勿外流。手機若無法直接預覽，請點「在新視窗開啟 PDF」。</div>

    <div class="disc">
      <div class="disc-head"><span class="dot"></span><h3>學習心得研討</h3><span class="count" id="postCount"></span></div>
      <div class="post-form">
        <div class="row">
          <div><label>您的姓名 *</label><input type="text" id="pName" placeholder="請填真實姓名，方便同仁交流" value="${esc(localStorage.getItem("rc_name")||"")}"></div>
        </div>
        <textarea id="pContent" placeholder="讀完這個章節，您的收穫、反思、或想跟大家討論的問題⋯"></textarea>
        <div class="form-foot"><button class="btn solid" onclick="submitPost(null)">發布心得</button></div>
      </div>
      <div id="postList">載入中⋯</div>
    </div>`;
  loadPosts();
}

async function loadPosts(){
  const { data: posts, error } = await db.from("posts").select("*").eq("chapter_id",state.chapterId).order("created_at",{ascending:true});
  if(error){ $("postList").innerHTML=`<div class="empty">心得載入失敗：${esc(error.message)}</div>`; return; }
  const tops = posts.filter(p=>!p.parent_id);
  const replies = pid => posts.filter(p=>p.parent_id===pid);
  $("postCount").textContent = `共 ${posts.length} 則`;
  if(!tops.length){ $("postList").innerHTML=`<div class="empty">還沒有人分享心得，成為第一位分享者吧。</div>`; return; }
  $("postList").innerHTML = tops.map(p=>renderPost(p,false)+replies(p.id).map(r=>renderPost(r,true)).join("")+`<div id="rf-${p.id}"></div>`).join("");
}

function renderPost(p, isReply){
  return `<div class="post ${isReply?"reply":""}">
    <div class="p-head"><span class="p-name">${esc(p.author_name)}</span><span class="p-time">${fmtTime(p.created_at)}</span></div>
    <div class="p-body">${esc(p.content)}</div>
    <div class="p-actions">
      ${!isReply?`<button onclick="showReplyForm('${p.id}')">回覆</button>`:""}
      ${isAdmin()?`<button class="del" onclick="deletePost('${p.id}')">刪除</button>`:""}
    </div></div>`;
}

function showReplyForm(pid){
  const slot=$("rf-"+pid);
  if(slot.innerHTML){ slot.innerHTML=""; return; }
  slot.innerHTML=`<div class="post-form reply-form">
    <div class="row"><div><label>您的姓名 *</label><input type="text" id="rName-${pid}" value="${esc(localStorage.getItem("rc_name")||"")}"></div></div>
    <textarea id="rContent-${pid}" placeholder="回應這則心得⋯"></textarea>
    <div class="form-foot"><button class="btn plain" onclick="$('rf-${pid}').innerHTML=''">取消</button>
    <button class="btn solid" onclick="submitReply('${pid}')">發布回覆</button></div></div>`;
}

async function submitPost(parentId){
  const name=$("pName").value.trim(), content=$("pContent").value.trim();
  if(!name||!content){ toast("姓名與內容皆為必填"); return; }
  localStorage.setItem("rc_name",name);
  const { error } = await db.from("posts").insert({ chapter_id:state.chapterId, parent_id:parentId, author_name:name, content });
  if(error){ toast("發布失敗："+error.message); return; }
  $("pContent").value=""; toast("已發布"); loadPosts();
}
async function submitReply(pid){
  const name=$("rName-"+pid).value.trim(), content=$("rContent-"+pid).value.trim();
  if(!name||!content){ toast("姓名與內容皆為必填"); return; }
  localStorage.setItem("rc_name",name);
  const { error } = await db.from("posts").insert({ chapter_id:state.chapterId, parent_id:pid, author_name:name, content });
  if(error){ toast("發布失敗："+error.message); return; }
  toast("已發布"); loadPosts();
}
async function deletePost(id){
  if(!confirm("確定刪除這則心得（含其回覆）？")) return;
  const { error } = await db.from("posts").delete().eq("id",id);
  if(error){ toast("刪除失敗："+error.message); return; }
  toast("已刪除"); loadPosts();
}

/* ---------- 全站資料匯出 ---------- */
async function exportAll(){
  toast("正在整理備份資料⋯");
  const [{data:books},{data:chapters},{data:posts}] = await Promise.all([
    db.from("books").select("*").order("created_at"),
    db.from("chapters").select("*").order("book_id"),
    db.from("posts").select("*").order("created_at")
  ]);
  const backup = {
    exported_at: new Date().toISOString(),
    note: "GOTREND 讀書研討會平台完整備份。pdf_url 為各章節 PDF 的下載連結，可逐一下載保存。",
    books, 
    chapters: chapters.map(c=>({ ...c, pdf_url: pdfUrl(c.pdf_path) })),
    posts
  };
  const blob = new Blob([JSON.stringify(backup,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`讀書會平台備份_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast("備份檔已下載（含所有 PDF 下載連結）");
}

init();
</script>
</body>
</html>
